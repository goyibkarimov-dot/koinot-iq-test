<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kosmik IQ Test Platformasi</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 70%, #020617 100%);
            color: #f8fafc; overflow-x: hidden; min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px; position: relative;
        }
        .constellation { position: fixed; width: 250px; height: 250px; opacity: 0.25; z-index: 1; pointer-events: none; filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.6)); animation: floatEffect 6s ease-in-out infinite alternate; }
        #einstein { top: 10%; left: 5%; }
        #tesla { bottom: 10%; right: 5%; animation-delay: 3s; }
        @keyframes floatEffect { 0% { transform: translateY(0px) rotate(0deg); } 100% { transform: translateY(-15px) rotate(3deg); } }
        .card-container { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); max-width: 550px; width: 100%; padding: 40px; border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); border: 1px solid rgba(255, 255, 255, 0.08); z-index: 10; position: relative; }
        .cyber-btn { background: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%); color: white; border: none; padding: 16px 32px; border-radius: 14px; cursor: pointer; font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; width: 100%; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); margin-top: 15px; }
        .cyber-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(56, 189, 248, 0.6); }
        .welcome-title { font-size: 28px; font-weight: 800; color: #38bdf8; text-align: center; margin-bottom: 10px; text-shadow: 0 0 10px rgba(56,189,248,0.3); }
        .welcome-subtitle { font-size: 15px; color: #94a3b8; text-align: center; margin-bottom: 30px; }
        .input-group { position: relative; margin-bottom: 20px; }
        .cyber-input { width: 100%; padding: 16px 20px; background: rgba(30, 41, 59, 0.7); border: 2px solid #334155; border-radius: 14px; color: white; font-size: 16px; outline: none; transition: all 0.3s; }
        .cyber-input:focus { border-color: #38bdf8; box-shadow: 0 0 15px rgba(56,189,248,0.2); }
        .timer-box { font-size: 16px; font-weight: 700; color: #f43f5e; background: rgba(244, 63, 94, 0.1); padding: 10px; border-radius: 12px; text-align: center; margin-bottom: 25px; border: 1px solid rgba(244, 63, 94, 0.2); }
        .question { font-size: 19px; line-height: 1.6; margin-bottom: 25px; font-weight: 600; color: #f1f5f9; min-height: 60px; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 14px; margin-bottom: 25px; }
        .option-card { background: rgba(51, 65, 85, 0.4); color: #f8fafc; border: 2px solid rgba(71, 85, 105, 0.4); padding: 16px 22px; border-radius: 14px; cursor: pointer; text-align: left; font-size: 16px; font-weight: 500; transition: all 0.2s; width: 100%; }
        .option-card:hover { background: rgba(71, 85, 105, 0.6); border-color: #38bdf8; transform: translateX(4px); }
        .status-bar { display: flex; justify-content: space-between; align-items: center; color: #94a3b8; font-size: 14px; }
        
        /* Progress Bar dizayni */
        .progress-container { width: 100%; background: #334155; height: 10px; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #a855f7, #38bdf8); border-radius: 10px; transition: width 0.3s ease; box-shadow: 0 0 10px #38bdf8; }
        
        /* Natija ekrani dizayni */
        .result-title { font-size: 28px; font-weight: 800; color: #4ade80; margin-bottom: 15px; text-align: center; }
        .score-info { font-size: 16px; color: #94a3b8; margin-bottom: 20px; text-align: center; }
        .iq-display { font-size: 65px; font-weight: 900; margin: 15px 0; text-align: center; text-shadow: 0 0 25px currentColor; }
        .iq-green { color: #22c55e; }
        .analysis-text { font-size: 15px; color: #cbd5e1; line-height: 1.6; text-align: justify; background: rgba(15,23,42,0.4); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 25px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Einstein SVG -->
    <svg id="einstein" class="constellation" viewBox="0 0 100 100">
        <circle cx="50" cy="20" r="1.5" fill="#fff"/><circle cx="35" cy="35" r="1.5" fill="#fff"/><circle cx="65" cy="35" r="1.5" fill="#fff"/><circle cx="25" cy="55" r="1" fill="#fff"/><circle cx="75" cy="55" r="1" fill="#fff"/><circle cx="50" cy="80" r="1.5" fill="#fff"/>
        <line x1="50" y1="20" x2="35" y2="35" stroke="rgba(56,189,248,0.4)" stroke-width="0.5"/><line x1="50" y1="20" x2="65" y2="35" stroke="rgba(56,189,248,0.4)" stroke-width="0.5"/><line x1="35" y1="35" x2="25" y2="55" stroke="rgba(56,189,248,0.4)" stroke-width="0.5"/><line x1="65" y1="35" x2="75" y2="55" stroke="rgba(56,189,248,0.4)" stroke-width="0.5"/><line x1="25" y1="55" x2="50" y2="80" stroke="rgba(56,189,248,0.4)" stroke-width="0.5"/><line x1="75" y1="55" x2="50" y2="80" stroke="rgba(56,189,248,0.4)" stroke-width="0.5"/><line x1="35" y1="35" x2="65" y2="35" stroke="rgba(56,189,248,0.3)" stroke-width="0.5"/>
        <text x="50" y="92" fill="#38bdf8" font-size="6" font-family="sans-serif" text-anchor="middle" opacity="0.8">A. Einstein</text>
    </svg>

    <!-- Tesla SVG -->
    <svg id="tesla" class="constellation" viewBox="0 0 100 100">
        <circle cx="50" cy="15" r="1.5" fill="#fff"/><circle cx="30" cy="40" r="1" fill="#fff"/><circle cx="70" cy="40" r="1" fill="#fff"/><circle cx="50" cy="50" r="2" fill="#fff"/><circle cx="25" cy="75" r="1.5" fill="#fff"/><circle cx="75" cy="75" r="1.5" fill="#fff"/>
        <line x1="50" y1="15" x2="50" y2="50" stroke="rgba(168,85,247,0.4)" stroke-width="0.5"/><line x1="30" y1="40" x2="50" y2="50" stroke="rgba(168,85,247,0.4)" stroke-width="0.5"/><line x1="70" y1="40" x2="50" y2="50" stroke="rgba(168,85,247,0.4)" stroke-width="0.5"/><line x1="50" y1="50" x2="25" y2="75" stroke="rgba(168,85,247,0.4)" stroke-width="0.5"/><line x1="50" y1="50" x2="75" y2="75" stroke="rgba(168,85,247,0.4)" stroke-width="0.5"/>
        <text x="50" y="90" fill="#a855f7" font-size="6" font-family="sans-serif" text-anchor="middle" opacity="0.8">N. Tesla</text>
    </svg>

    <div class="card-container">
        <!-- 1. Kirish ekrani -->
        <div id="welcome-screen">
            <div class="welcome-title">Koinot Intellekt Sinovi</div>
            <div class="welcome-subtitle">Miyyangiz salohiyatini buyuk daholar foni ostida sinab ko'ring</div>
            <div class="input-group">
                <input type="text" id="username" class="cyber-input" placeholder="Ismingizni kiriting..." autocomplete="off">
            </div>
            <button class="cyber-btn" onclick="startQuiz()">Testni Boshlash</button>
        </div>

        <!-- 2. Savollar ekrani -->
        <div id="quiz-screen" class="hidden">
            <div class="timer-box">QOLGAN VAQT: <span id="time-left">10:00</span></div>
            <div class="question" id="question-text">Savol yuklanmoqda...</div>
            <div class="options-grid" id="options-container"></div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="status-bar">
                <span id="progress-text">Savol: 1/5</span>
            </div>
        </div>

        <!-- 3. Natija ekrani -->
        <div id="result-screen" class="hidden">
            <div class="result-title">Sinov Yakunlandi!</div>
            <div class="score-info" id="user-greeting">Hurmatli Foydalanuvchi</div>
            <div class="iq-display iq-green" id="iq-score">100</div>
            <div class="analysis-text" id="analysis-comment">
                Sizning tahliliy fikrlash darajangiz yaxshi shakllangan. Mantiqiy bog'liqliklarni topishda faolsiz.
            </div>
            <button class="cyber-btn" onclick="location.reload()">Qayta topshirish</button>
        </div>
    </div>

    <!-- JavaScript Mantiqi -->
    <script>
        // Mantiqiy IQ savollar bazasi
        const quizData = [
            {
                question: "Ketma-ketlikni davom ettiring: 2, 4, 8, 16, ?",
                options: ["20", "24", "32", "64"],
                correct: 2
            },
            {
                question: "Agar 'KITOBLAR' so'zi 'RALBOTIK' deb kodlansa, 'QALAM' qanday kodlanadi?",
                options: ["MALAQ", "MALA", "ALAMQ", "MALQA"],
                correct: 0
            },
            {
                question: "Daraxtda 5 ta qush o'tirgan edi. Ovchi bittasini otib tushirdi. Daraxtda nechta qush qoldi?",
                options: ["4 ta", "0 ta (qolganlari uchib ketdi)", "5 ta", "1 ta"],
                correct: 1
            },
            {
                question: "Qaysi so'z ortiqcha: Olma, Banan, Pomidor, Shaftoli?",
                options: ["Olma", "Banan", "Pomidor", "Shaftoli"],
                correct: 2
            },
            {
                question: "M mantiqiy elementlar zanjirida: 3=9, 4=16, 5=25 bo'lsa, 6=?",
                options: ["30", "36", "42", "49"],
                correct: 1
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let timer;
        let timeLeft = 600; // 10 daqiqa (soniyalarda)

        function startQuiz() {
            const nameInput = document.getElementById("username").value.trim();
            if (!nameInput) {
